name: Deploy to GitHub Pages

# Every push to main rebuilds and republishes the site. Nothing else to run.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages needs these; the job cannot deploy without them.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it half-published.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The same validation the CI workflow runs: content schemas, then the
      # internal link checker, then JSON-LD and per-page SEO. A broken link or
      # an invalid Event block fails here and never reaches the live site.
      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
